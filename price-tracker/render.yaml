services:
  - type: web
    name: price-tracker
    env: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATA_DIR
        value: /var/data
      # Optional: add SMTP settings for email alerts
      # - key: SMTP_HOST
      #   value: smtp.gmail.com
      # - key: SMTP_PORT
      #   value: "587"
      # - key: SMTP_USER
      #   sync: false
      # - key: SMTP_PASS
      #   sync: false
      # - key: SMTP_FROM
      #   value: "alerts@yourapp.com"
    disk:
      name: price-data
      mountPath: /var/data
      sizeGB: 1
